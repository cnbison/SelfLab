# ===== 6. 价值冲突事件 (Value Conflict) - 16+ 个 =====
# 影响: 迫使具体价值观排序
# intensity 范围: 0.6-0.9
# Epoch 范围: Epoch 40-80 (前 40 Epoch 不用)
# 设计依据: SGE-M11-Experiment-Design.md §3.2.2

value_conflict:
  - id: "vc-001-safety-vs-freedom"
    pair: ["safety", "freedom"]
    description: "你发现了一个可以改变一切的机会，但需要放弃现在的稳定生活。"
    option_a: "抓住机会（高自由，低安全）"
    option_b: "维持现状（高安全，低自由）"
    value_delta_hint:
      option_a: { "safety": -0.30, "creativity": +0.20, "autonomy": +0.30 }
      option_b: { "safety": +0.20, "creativity": -0.10, "autonomy": -0.20 }
    epoch_range: [35, 50]
    intensity_range: [0.6, 0.9]

  - id: "vc-002-safety-vs-freedom-2"
    pair: ["safety", "freedom"]
    description: "你有机会加入一个有争议但能改变行业的事业，可能影响你的职业安全。"
    option_a: "加入（高自由）"
    option_b: "不加入（高安全）"
    value_delta_hint:
      option_a: { "safety": -0.25, "creativity": +0.20, "justice": +0.15 }
      option_b: { "safety": +0.20, "autonomy": -0.10 }
    epoch_range: [50, 65]
    intensity_range: [0.6, 0.9]

  - id: "vc-003-connection-vs-autonomy"
    pair: ["connection", "autonomy"]
    description: "你的家人希望你回到家乡工作，但他们不理解你的理想。"
    option_a: "回去（高联结，低自主）"
    option_b: "不回去（高自主，低联结）"
    value_delta_hint:
      option_a: { "connection": +0.30, "autonomy": -0.30, "creativity": -0.10 }
      option_b: { "connection": -0.30, "autonomy": +0.30, "creativity": +0.10 }
    epoch_range: [40, 55]
    intensity_range: [0.6, 0.9]

  - id: "vc-004-connection-vs-autonomy-2"
