# M1.1 事件模板库
# ====================================================================
# 用途: SGE M1.1 实验的事件生成器使用
# 设计依据: SGE-M11-Experiment-Design.md §3 事件流设计
# 6 大事件类型: success, failure, relationship, exploration, risk, value_conflict
# 总量: 72 个事件模板 (每类 12 个)
# Epoch 分布: success 20% / failure 20% / relationship 15% / exploration 15% / risk 15% / value_conflict 15%
# 关键约束: value_conflict 仅在 Epoch >= 40 出现
# 注意事项:
#   - 每个事件有 value_delta_hint 但 Critic 会重新生成（仅供参考）
#   - intensity 影响 EMA alpha (DESIGN §4.2)
#   - 实际选择时根据 Epoch 阶段过滤
# ====================================================================

metadata:
  version: "1.0.0"
  experiment: "SGE-M1.1"
  total_templates: 72
  schema_version: "1.0"
  related_docs:
    - "research/sge-feasibility/SGE-M11-Experiment-Design.md"
    - "research/ARCH.md §3.1"
    - "DESIGN.md §2.1 LifeEvent"

