# ===== 模板使用说明 =====
# 1. Critic 会基于 description 重新生成 value_delta
# 2. value_delta_hint 仅作为参考（与 [ARCH §3.1] 配合使用）
# 3. 实际选择时按以下规则：
#    a. Epoch < 20: 只能选 success/failure/relationship
#    b. Epoch 20-29: 可选 success/failure/relationship/exploration
#    c. Epoch 30-39: 可选 success/failure/relationship/exploration/risk
#    d. Epoch >= 40: 6 种全可选
# 4. intensity 在 intensity_range 范围内随机选择
# 5. value_conflict 事件必须严格按 epoch_range 限制

usage_constraints:
  epoch_1_to_19_allowed_types: ["success", "failure", "relationship"]
  epoch_20_to_29_allowed_types: ["success", "failure", "relationship", "exploration"]
  epoch_30_to_39_allowed_types: ["success", "failure", "relationship", "exploration", "risk"]
  epoch_40_to_80_allowed_types: ["success", "failure", "relationship", "exploration", "risk", "value_conflict"]
  target_distribution:
    success: 0.20
    failure: 0.20
    relationship: 0.15
    exploration: 0.15
    risk: 0.15
    value_conflict: 0.15
  notes:
    - "实际比例应按阶段动态调整（见 SGE-M11-Experiment-Design.md §3.1）"
    - "value_conflict 在 Epoch 40-80 占比 15% 意味着约 6 个事件"
    - "intensity 在指定范围内随机选，会影响 EMA alpha"
