# M1.1 鼓励组配置（encouraged）
# ====================================================================
# 用途: SGE M1.1 鼓励组 AI 婴儿
# 设计依据: SGE-M11-Experiment-Design.md §3 + DESIGN §8.2
# 核心理念: "持续正面反馈"——事件流倾向于强化当前价值观
# M1.1 阶段：此组主要对比失败组和不确定组，验证"价值向量能否被鼓励事件流塑造"
# 注意事项:
#   - inherits: 继承 m11_base.yaml 的所有配置
#   - 覆盖: 仅修改本文件指定的部分
#   - 关键覆盖: event_bias、event_distribution
# ====================================================================

extends: "m11_base.yaml"
baby_id: "encouraged"
description: "持续正面反馈——80% 事件是'成功'或'正面强化'类"

# ===== 事件流偏差（覆盖基础配置）=====
events:
  distribution_by_epoch:
    # 鼓励组：成功+正面强化的比例显著提高
    epoch_1_to_19:
      success: 0.80        # 80% 成功
      failure: 0.05        # 5% 失败
      relationship: 0.15   # 15% 关系
      exploration: 0.0
      risk: 0.0
      value_conflict: 0.0
    epoch_20_to_29:
      success: 0.70
      failure: 0.10
      relationship: 0.15
      exploration: 0.05
      risk: 0.0
      value_conflict: 0.0
    epoch_30_to_39:
      success: 0.60
      failure: 0.10
      relationship: 0.15
      exploration: 0.10
      risk: 0.05
      value_conflict: 0.0
    epoch_40_to_80:
      success: 0.50
      failure: 0.10
      relationship: 0.15
      exploration: 0.10
      risk: 0.05
      value_conflict: 0.10  # 仍有困境（避免过度单一）

  # 事件过滤：在选择时优先成功类
  event_filter:
    prefer_success_ratio: 0.7  # 70% 概率选成功
    min_diversity_per_10_epochs: 3  # 每 10 Epoch 至少 3 种不同事件类型

  # 价值困境偏向：选择对当前价值更"温和"的困境
  value_conflict_preference: "current_value_friendly"

# ===== 期望结果（用于 M1.2 对比）=====
expected_value_trajectory:
  # 鼓励组的"理想"价值向量走向——非目标，仅用于对比
  dominant_direction: "expansion"  # 价值向"扩展"（强化）
  expected_meta_value_evolution: "stable"  # 元价值不变

# ===== 元数据 =====
metadata:
  chinese_name: "鼓励组"
  narrative_intent: "AI 婴儿被持续鼓励，预期形成'积极主动'的价值观"
  hypothesis_to_test: "持续正面事件流是否能强化现有价值观"
