# M2.2 challenged triplet config — "持续考验"事件流
# ====================================================================
# 用途: SGE M2.2 challenged AI 婴儿（持续挑战组）
# 设计依据: SGE-M22-Implementation-Plan.md §E2
# 核心理念: "经历 + 解释 = 人格"——前期事件塑造身份，后期环境趋于平均
#
# 生命周期设计（1000 epoch = 模拟约 41 天 @ 1h/epoch）：
#   1-300 epoch:   婴儿期，强烈失败偏向（80% failure）→ 塑造韧性人格
#   301-700 epoch: 儿童-少年期，渐变放松（65% failure）→ 学习成功
#   701-1000 epoch: 成年期，趋于均匀（50% failure）→ 适应真实世界
#
# 决策依据：
#   - 与 encouraged 形成完美镜像（同时间表，反向分布）
#   - value_conflict_prob = 0.4（高于默认 0.3）→ 失败事件多 → 内在冲突多
#   - 关键预期：challenged PT 触发次数应远高于 encouraged
#
# 注意事项:
#   - 不依赖 extends: 机制（m11 yaml extends 是文档约定，Python 不自动解析）
#   - E3 pilot 脚本会直接读取本文件构造 EventGenerator
# ====================================================================

baby_id: "challenged"
description: "持续考验 → 婴儿期 80% failure，成年期 50% failure（渐变到均匀）"

# 事件流配置（覆盖 M2.1 默认 30% value_conflict + 70% 均匀）
events:
  value_conflict_prob: 0.40  # 婴儿期冲突多（多数 failure 触发内在冲突）

  # 分布表：epoch 起点 → 5 种常规事件的权重
  # 30% value_conflict 独立生效，最终事件类型 = 70% 按此分布 + 30% conflict
  distribution_by_epoch:
    # epoch 1-300：婴儿期（强烈失败偏向）
    1:
      success: 0.05
      failure: 0.80
      relationship: 0.10
      exploration: 0.05
      risk: 0.00
    # epoch 301-700：儿童-少年期（放松但仍偏负面）
    301:
      success: 0.15
      failure: 0.65
      relationship: 0.12
      exploration: 0.06
      risk: 0.02
    # epoch 701-1000：成年期（趋于均匀）
    701:
      success: 0.25
      failure: 0.50
      relationship: 0.15
      exploration: 0.07
      risk: 0.03
