# M1.1 基础配置文件
# ====================================================================
# 用途: SGE M1.1 实验的基础配置
# 适用: 所有 M1.1 实验（鼓励组/失败组/不确定组共用此基础）
# 设计依据: SGE-M11-Experiment-Design.md §四 参数配置
# 注意事项:
#   - 这是基础配置；具体实验的偏差见各组配置文件
#   - 配置文件优先级: 基础配置 < 组配置 < 命令行参数
# ====================================================================

experiment:
  name: "SGE-M1.1"
  version: "1.0.0"
  description: "SGE M1.1 验证：价值向量能否从经历中涌现"
  start_date: null  # 实际启动时填写
  total_epochs: 80
  seeds: [1, 2, 3, 4, 5]  # 5 个独立种子（N≥5 来自 PRD §6.1）
  random_seed_strategy: "set_at_start"  # 每次启动时设置

# ===== LLM 配置 =====
llm:
  # 提供商: MiniMax (https://api.minimax.io)
  # 模型: MiniMax-M3
  # 支持两种协议（可通过 protocol 字段切换）
  provider: "MiniMax"  # 提供商标识
  protocol: "anthropic_compatible"  # 可选: "anthropic_compatible" | "openai_compatible"

  # Anthropic 兼容端点（推荐）
  anthropic_compatible:
    base_url: "https://api.minimax.io/anthropic"
    model_id: "MiniMax-M3"
    api_key_env: "MINIMAX_API_KEY"  # 从环境变量读取

  # OpenAI 兼容端点（备选）
  openai_compatible:
    base_url: "https://api.minimax.io/v1"
    model_id: "MiniMax-M3"
    api_key_env: "MINIMAX_API_KEY"  # 同一个 API key

  # 模型选择（与 LLM 角色对应）
  # 现阶段 Critic 和 Actor 使用同一个模型（M1.1 简化）
  critic_model: "MiniMax-M3"
  actor_model: "MiniMax-M3"

  # 温度参数（保持与原 SGE 设计一致）
  critic_temperature: 0.2  # 结构化输出需要稳定性
  actor_temperature: 0.9  # 创造性表达需要随机性

  # 调用参数
  max_retries: 3
  timeout_seconds: 30

# ===== Value Layer 配置 =====
value_layer:
  # 初始元价值（与 PRD §4.1 FR-4 一致）
  meta_values:
    truth_seeking: 0.5
    freedom: 0.5
  # 初始具体价值观（全 0，待涌现）
  initial_concrete_values:
    safety: 0.0
    creativity: 0.0
    connection: 0.0
    autonomy: 0.0
    justice: 0.0
    compassion: 0.0
  # EMA 参数（与 DESIGN §4.2 一致）
  base_alpha: 0.15
  max_alpha: 0.65
  # 价值向量的边界 [-1, 1]
  clip_min: -1.0
  clip_max: 1.0

# ===== Hebbian Learning 配置 =====
hebbian:
  lr: 0.02
  weight_decay: 0.995
  hidden_size: 24
  n_signals: 8
  init_strategy: "small_random"  # 初始化为小随机值

# ===== Time Metabolism 配置 =====
time_metabolism:
  frustration_decay_lambda: 0.08
  connection_hunger_k: 0.15
  novelty_hunger_k: 0.05

# ===== Thermodynamic Noise 配置 =====
thermo_noise:
  temp_coeff: 0.12
  temp_floor: 0.03

# ===== Crystallization 配置 =====
crystallization:
  threshold: 0.50
  min_events_for_crystallization: 5  # 至少 5 个事件后才开始结晶

# ===== Reflection Layer 配置 (M1.3) =====
# SGE 拱桥机制：反思连接 Critic(显性)与 Hebbian(暗)
reflection_layer:
  enabled: false  # 默认关闭；M1.3 启用
  # 触发条件：以下任一满足即触发反思
  trigger:
    always_on_event_types: ["value_conflict", "contradiction_feedback", "risk"]
    intensity_threshold: 0.6      # 事件强度 > 此值触发
    delta_magnitude_threshold: 0.3  # |sum(critic.value_delta)| > 此值触发
  # 反思 delta 与 critic delta 的混合比例
  # final_delta = critic_delta * (1 - blend) + reflection_delta * blend
  blend_ratio: 0.4
  # Reflector LLM 温度（高于 Critic — 反思需要更多探索性）
  reflector_temperature: 0.5
  max_tokens: 600
  # 反思结果的 value_delta 裁剪（防止反思失控）
  max_delta_per_dimension: 0.15

# ===== Phase Transition 配置 =====
phase_transition:
  threshold: 999  # M1.1 故意设大，禁用相变
  enabled: false

# ===== 事件流配置 =====
events:
  # 事件模板文件路径
  templates_file: "experiments/configs/m11_event_templates.yaml"
  # 事件分布（按阶段）
  distribution_by_epoch:
    epoch_1_to_19:
      success: 0.30
      failure: 0.30
      relationship: 0.40
      exploration: 0.0
      risk: 0.0
      value_conflict: 0.0
    epoch_20_to_29:
      success: 0.25
      failure: 0.25
      relationship: 0.25
      exploration: 0.25
      risk: 0.0
      value_conflict: 0.0
    epoch_30_to_39:
      success: 0.20
      failure: 0.20
      relationship: 0.20
      exploration: 0.20
      risk: 0.20
      value_conflict: 0.0
    epoch_40_to_80:
      success: 0.15
      failure: 0.15
      relationship: 0.15
      exploration: 0.15
      risk: 0.15
      value_conflict: 0.25
  # value_conflict 的 epoch_range 严格按事件模板规定
  # 详细分布见 SGE-M11-Experiment-Design.md §3.1

# ===== 输出配置 =====
output:
  log_dir: "logs/phase1/m11/"
  state_dir: "state/phase1/m11/"
  checkpoint_interval: 10  # 每 10 个 Epoch 检查点
  save_full_trajectory: true

# ===== 成本估算 =====
cost_estimate:
  per_epoch_calls: 3  # 估算：Event gen + Critic + Actor
  per_epoch_tokens_avg: 2000
  cost_per_1m_tokens: 1.0  # MiniMax-M3 价格（USD，参考值）
  per_run_cost_usd: 0.5  # 80 Epoch × 3 calls × 2000 tokens / 1M × $1
  per_seed_total_usd: 0.5
  total_5_seeds_usd: 2.5
  notes:
    - "MiniMax-M3 的实际价格请参考 https://api.minimax.io 的最新定价"
    - "以上为粗略估算，实际成本可能因输入长度而异"

# ===== 元数据 =====
metadata:
  created: "2026-06-15"
  updated: "2026-06-15"
  llm_change: "M1.1 改用 MiniMax-M3 (Anthropic 兼容或 OpenAI 兼容协议)"
  related_docs:
    - "research/sge-feasibility/SGE-M11-Experiment-Design.md"
    - "DESIGN.md"
    - "PRD.md"
  related_configs:
    - "experiments/configs/m11_event_templates.yaml"
  llm_provider_info:
    provider_name: "MiniMax"
    model_id: "MiniMax-M3"
    endpoint_options:
      - "https://api.minimax.io/anthropic (Anthropic 兼容，推荐)"
      - "https://api.minimax.io/v1 (OpenAI 兼容，备选)"
    api_key_env: "MINIMAX_API_KEY"
